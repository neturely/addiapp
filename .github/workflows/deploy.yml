name: Deploy to production (KnownHost)

# Builds the SPA and ships the static build + PHP API to the KnownHost account
# over SSH, then runs migrations. PHP has no long-running process, so there is
# nothing to restart. One-time server setup is documented in docs/DEPLOY.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build the SPA
        # Public Turnstile site key (#79), baked into the client bundle. Not a
        # secret, but kept in GH secrets so it isn't hardcoded in the repo.
        env:
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: |
          npm ci
          npm run build -w client

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_SSH_PORT }}" "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      # --- Migrate BEFORE cutover (OPS-2, #103) -----------------------------
      # Schema migrates before any new code goes live, and a pre-deploy DB backup
      # gates the migration, so a failed migrate aborts the deploy before code
      # cuts over — never the "new code stranded on un-migrated schema" state.

      - name: Ship ops script → ~/bin (keeps the box backup-db.sh current)
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_SSH_PORT }}" \
            scripts/backup-db.sh "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:bin/"

      - name: Ship migrations → ~/api/migrations (before running them)
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_SSH_PORT }}" \
            api/migrations/ "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:api/migrations/"

      - name: Pre-deploy backup + migrate
        # The backup MUST succeed before migrate runs (&&). Runs the on-box (old)
        # migrate.php against the just-shipped .sql — the runner contract is stable.
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_SSH_PORT }}" \
            "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
            'chmod +x ~/bin/backup-db.sh && ~/bin/backup-db.sh --pre-deploy && php ~/api/migrate.php'

      - name: Deploy PHP API → ~/api (code cutover)
        run: |
          rsync -az --delete \
            --exclude='config.php' --exclude='config.example.php' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_SSH_PORT }}" \
            api/ "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:api/"

      - name: Deploy SPA → public_html (cutover last)
        run: |
          rsync -az --delete \
            --exclude='.well-known' --exclude='api' --exclude='cgi-bin' --exclude='.ftpquota' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_SSH_PORT }}" \
            client/dist/ "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:public_html/"
